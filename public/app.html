<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>IELTS Beach</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
/* === RESET === */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input{font-family:inherit;border:none;outline:none}

/* === VARIABLES === */
:root{
  --sky-top:#4A90D9;--sky-mid:#87CEEB;--sky-bottom:#B0E0E6;--sky-horizon:#FFF8DC;
  --sun-color:#FFD700;--sun-glow:rgba(255,215,0,0.6);--sun-size:44px;--sun-top:14%;--sun-left:68%;
  --ocean-top:#5BA4CF;--ocean-bottom:#3A7CA5;
  --sand:#F4D9A0;--sand-dark:#E8C878;
  --bg-card:rgba(255,255,255,0.92);--text:#2C3E50;--muted:#8B9DAF;
  --accent:#FF6B35;--success:#27AE60;--danger:#E74C3C;--warning:#F39C12;
  --font-pixel:'Press Start 2P',monospace;
  --star-opacity:0;--moon-opacity:0;--cloud-opacity:0.3;
  --px:4px; /* pixel unit */
}

/* === BEACH SCENE (overhead view) === */
.beach{position:fixed;inset:0;z-index:0;pointer-events:none}

/* === SKY (user likes this - keep gradient) === */
.sky{position:absolute;top:0;left:0;right:0;height:30%;background:linear-gradient(180deg,var(--sky-top)0%,var(--sky-mid)30%,var(--sky-bottom)70%,var(--sky-horizon)100%);transition:background 1.5s ease}
.sun{position:absolute;top:var(--sun-top);left:var(--sun-left);width:var(--sun-size);height:var(--sun-size);border-radius:50%;background:radial-gradient(circle at 35%35%,#FFF8DC,var(--sun-color)35%,#FFA500 75%,#E87400 100%);box-shadow:0 0 20px var(--sun-glow),0 0 50px rgba(255,165,0,0.3),0 0 80px rgba(255,140,0,0.15);animation:spulse 4s ease-in-out infinite;transition:all 1.5s ease}
@keyframes spulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.moon{position:absolute;top:8%;left:28%;width:32px;height:32px;border-radius:50%;background:radial-gradient(circle at 40%35%,#F5F5F5,#E0E0E0 40%,#C8C8C8 70%,#A0A0A0 100%);box-shadow:0 0 20px rgba(200,200,220,0.4);opacity:var(--moon-opacity);transition:opacity 1s ease}
.stars{position:absolute;top:0;left:0;right:0;height:100%;opacity:var(--star-opacity);transition:opacity 1.5s ease;
  background-image:radial-gradient(1.5px 1.5px at 5% 15%,#FFF,transparent),radial-gradient(1px 1px at 12% 35%,#FFF,transparent),radial-gradient(1.5px 1.5px at 22% 8%,#FFE,transparent),radial-gradient(1px 1px at 30% 42%,#FFF,transparent),radial-gradient(1.5px 1.5px at 38% 18%,#FFF,transparent),radial-gradient(1px 1px at 48% 5%,#FFF,transparent),radial-gradient(1.5px 1.5px at 55% 38%,#FFF,transparent),radial-gradient(1px 1px at 65% 12%,#FFF,transparent),radial-gradient(1.5px 1.5px at 75% 30%,#FFF,transparent),radial-gradient(1px 1px at 85% 8%,#FFF,transparent),radial-gradient(1.5px 1.5px at 92% 25%,#FFF,transparent),radial-gradient(1px 1px at 18% 50%,#FFF,transparent),radial-gradient(1.5px 1.5px at 42% 48%,#FFE,transparent),radial-gradient(1px 1px at 68% 45%,#FFF,transparent),radial-gradient(1px 1px at 82% 42%,#FFF,transparent);
  animation:twinkle 3s alternate infinite}
@keyframes twinkle{0%{opacity:.5}50%{opacity:.9}100%{opacity:.6}}
.clouds{position:absolute;top:0;left:0;right:0;height:100%;opacity:var(--cloud-opacity);transition:opacity 1.5s ease}
.cloud{position:absolute;background:rgba(255,255,255,0.85);border-radius:50px}
.cloud::before,.cloud::after{content:'';position:absolute;background:inherit;border-radius:50%}
.c1{width:80px;height:26px;top:15%}.c1::before{width:36px;height:36px;top:-18px;left:14px}.c1::after{width:22px;height:22px;top:-10px;right:12px}
.c2{width:64px;height:22px;top:30%}.c2::before{width:28px;height:28px;top:-14px;left:10px}.c2::after{width:18px;height:18px;top:-8px;right:10px}
.ctop{animation:cdrift 28s linear infinite}
.cmid{animation:cdrift 20s linear infinite;animation-delay:-8s}
@keyframes cdrift{0%{transform:translateX(-120px)}100%{transform:translateX(calc(100vw+120px))}}

/* === OCEAN BAND (top-down view — soft water transition) === */
.ocean{position:absolute;top:28%;left:0;right:0;height:18%;overflow:hidden}
/* Horizon glow — soft blend from sky to ocean */
.ocean::before{content:'';position:absolute;top:-8px;left:0;right:0;height:16px;background:linear-gradient(180deg,var(--sky-horizon,#FFF8DC)0%,rgba(255,248,220,0.5)40%,transparent 100%);z-index:2}
.ocean-water{position:absolute;inset:0;background:linear-gradient(180deg,var(--ocean-top)0%,var(--ocean-bottom)60%,#2A6A8A 100%);transition:all 1.5s ease}
/* Soft pixel wave texture — subtle dither */
.ocean-tex{position:absolute;inset:0;opacity:0.6;
  background-image:
    repeating-linear-gradient(0deg,transparent,transparent 12px,rgba(255,255,255,0.08)12px,rgba(255,255,255,0.08)14px,transparent 14px,transparent 24px),
    repeating-linear-gradient(90deg,transparent 0 8px,rgba(255,255,255,0.12)8px,rgba(255,255,255,0.12)9px,transparent 9px 18px,rgba(255,255,255,0.06)18px,rgba(255,255,255,0.06)19px,transparent 19px 28px);
  image-rendering:pixelated;animation:opxmove 6s linear infinite}
@keyframes opxmove{0%{transform:translateX(0)}100%{transform:translateX(28px)}}

/* Gentle shore — wet sand gradient between ocean and dry sand */
.shore-wet{position:absolute;top:100%;left:0;right:0;height:20px;background:linear-gradient(180deg,rgba(100,160,190,0.6)0%,rgba(180,160,130,0.3)50%,transparent 100%);z-index:1}
/* Foam line — pixelated white dashes */
.shore-foam{position:absolute;top:0;left:0;right:0;height:5px;z-index:3;
  background:repeating-linear-gradient(90deg,rgba(255,255,255,0.5)0 6px,transparent 6px 8px,rgba(255,255,255,0.3)8px 10px,transparent 10px 14px,rgba(255,255,255,0.4)14px 18px,transparent 18px 22px);
  image-rendering:pixelated;animation:foam 1.2s steps(2) infinite}
@keyframes foam{0%{transform:translateX(0)}50%{transform:translateX(5px)}}

/* === SAND (overhead — warm with pixel grain) === */
.sand-overhead{position:absolute;top:46%;left:0;right:0;bottom:0;background-color:var(--sand);
  /* Pixel noise texture for sand grain */
  background-image:
    radial-gradient(2px 2px at 10% 15%,#E8D098,transparent),
    radial-gradient(2px 2px at 25% 8%,#DCC488,transparent),
    radial-gradient(1px 1px at 40% 22%,#E0C890,transparent),
    radial-gradient(2px 2px at 55% 12%,#ECD8A0,transparent),
    radial-gradient(1px 1px at 70% 18%,#D8C080,transparent),
    radial-gradient(2px 2px at 85% 5%,#E4CC94,transparent),
    radial-gradient(1px 1px at 8% 35%,#DCC488,transparent),
    radial-gradient(2px 2px at 32% 28%,#E8D098,transparent),
    radial-gradient(1px 1px at 50% 38%,#D8C080,transparent),
    radial-gradient(2px 2px at 68% 32%,#ECD8A0,transparent),
    radial-gradient(1px 1px at 90% 25%,#E0C890,transparent),
    radial-gradient(2px 2px at 15% 50%,#E4CC94,transparent),
    radial-gradient(1px 1px at 45% 48%,#DCC488,transparent),
    radial-gradient(2px 2px at 78% 45%,#E8D098,transparent);
  transition:background-color 1.5s ease;image-rendering:pixelated}

/* Sand gradient overlay for depth */
.sand-overhead::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(232,200,120,0.4)0%,transparent 15%,transparent 80%,rgba(200,170,110,0.4)100%);pointer-events:none}

/* === PIXEL ART SPRITES (built with box-shadow) === */
/* Base: each "pixel unit" is --px (4px) */
.px-el{position:absolute;width:var(--px);height:var(--px);image-rendering:pixelated}
/* Pixel ocean sparkle */
.px-sparkle{bottom:70%;left:35%;box-shadow:0 0 #FFF}

/* Pixel starfish (12×10 px grid, each cell=4px) */
.px-starfish{bottom:28%;right:18%;width:0;height:0;
  box-shadow:
    /* row 0 */ 16px 0 #E8745C,20px 0 #E8745C,
    /* row 1 */ 8px 4px #E8745C,12px 4px #F09080,16px 4px #E8745C,20px 4px #F09080,24px 4px #E8745C,
    /* row 2 */ 4px 8px #E8745C,8px 8px #F09080,12px 8px #F8B0A0,16px 8px #F09080,20px 8px #F8B0A0,24px 8px #F09080,28px 8px #E8745C,
    /* row 3 */ 0 12px #E8745C,4px 12px #F09080,8px 12px #F8B0A0,12px 12px #FCD0C8,16px 12px #F8B0A0,20px 12px #FCD0C8,24px 12px #F8B0A0,28px 12px #F09080,32px 12px #E8745C,
    /* row 4 */ 4px 16px #E8745C,8px 16px #F09080,12px 16px #F8B0A0,16px 16px #FCD0C8,20px 16px #F8B0A0,24px 16px #FCD0C8,28px 16px #F09080,
    /* row 5 */ 8px 20px #E8745C,12px 20px #F09080,16px 20px #F8B0A0,20px 20px #F09080,24px 20px #E8745C,
    /* row 6 */ 8px 24px #C06050,12px 24px #E8745C,16px 24px #F09080,20px 24px #E8745C,24px 24px #C06050,
    /* row 7 */ 12px 28px #C06050,16px 28px #E8745C,20px 28px #C06050,
    /* row 8 */ 16px 32px #C06050;
  animation:starfish-bob 3s ease-in-out infinite}
@keyframes starfish-bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}

/* Pixel shell 1 (scallop shape, 8×8) */
.px-shell1{bottom:35%;left:22%;
  box-shadow:
    8px 0 #FFF8F0,12px 0 #FFF8F0,16px 0 #FFF8F0,
    4px 4px #FFF0E4,8px 4px #FFE8D8,12px 4px #FFF8F0,16px 4px #FFE8D8,20px 4px #FFF0E4,
    4px 8px #FFE8D8,8px 8px #FFF8F0,12px 8px #FFF8F0,16px 8px #FFF8F0,20px 8px #FFE8D8,
    8px 12px #FFE0D0,12px 12px #FFF0E4,16px 12px #FFE0D0,
    12px 16px #E8C8B0}

/* Pixel shell 2 (small spiral, 6×5) */
.px-shell2{bottom:42%;left:65%;
  box-shadow:
    4px 0 #F0E0D0,8px 0 #F0E0D0,
    0 4px #E8D4C0,4px 4px #F8ECE0,8px 4px #E8D4C0,12px 4px #E8D4C0,
    0 8px #E8D4C0,4px 8px #F0E0D0,8px 8px #F8ECE0,12px 8px #E8D4C0,
    0 12px #D8C4B0,4px 12px #E0CCB8,8px 12px #E8D4C0,12px 12px #D8C4B0,
    4px 16px #C8B098,8px 16px #D0B8A0;
  transform:rotate(25deg)}

/* Pixel shell 3 */
.px-shell3{bottom:55%;left:78%;
  box-shadow:
    4px 0 #FFF4E8,8px 0 #FFF4E8,
    0 4px #FFECD8,4px 4px #FFF8F0,8px 4px #FFECD8,
    0 8px #FFE4CC,4px 8px #FFECD8,8px 8px #FFE4CC,
    4px 12px #E8D0B8;
  transform:rotate(-15deg)}

/* Pixel crab (tiny, 8×7) */
.px-crab{bottom:22%;left:48%;
  box-shadow:
    4px 0 #E05040,20px 0 #E05040,
    0 4px #E05040,4px 4px #E87860,8px 4px #E87860,16px 4px #E87860,20px 4px #E87860,24px 4px #E05040,
    0 8px #C04030,4px 8px #E05040,8px 8px #F09080,12px 8px #F09080,16px 8px #F09080,20px 8px #E05040,24px 8px #C04030,
    0 12px #C04030,4px 12px #E05040,8px 12px #F09080,12px 12px #FCC0B8,16px 12px #F09080,20px 12px #E05040,24px 12px #C04030,
    4px 16px #E05040,8px 16px #F09080,16px 16px #F09080,20px 16px #E05040,
    4px 20px #C04030,8px 20px #E87860,16px 20px #E87860,20px 20px #C04030;
  animation:crab-walk 8s linear infinite}
@keyframes crab-walk{0%{transform:translate(0,0)}24%{transform:translate(16px,2px)}25%{transform:translate(16px,2px)}49%{transform:translate(0,4px)}50%{transform:translate(0,4px)}74%{transform:translate(-16px,2px)}75%{transform:translate(-16px,2px)}100%{transform:translate(0,0)}}

/* Pixel palm tree — top-down view of fronds radiating from center */
.px-palm{position:absolute;bottom:18%;left:5%}
.px-palm-crown{position:absolute;width:0;height:0;
  /* Radiating fronds from center, top-down view */
  box-shadow:
    /* Center trunk */ 0 0 #8B6914,4px 0 #7A5A12,-4px 0 #7A5A12,0 4px #6B4F10,0 -4px #8B6914,
    /* Ring 1 */ 8px -8px #2E8B2E,4px -8px #228B22,12px -4px #228B22,-4px -8px #2E8B2E,-8px -4px #1E7B1E,-8px 4px #2E8B2E,-4px 8px #228B22,4px 8px #1E7B1E,8px 4px #2E8B2E,12px 0 #1E7B1E,-12px 0 #228B22,0 -12px #1E7B1E,0 12px #228B22,
    /* Ring 2 */ 16px -12px #2E8B2E,12px -16px #228B22,20px -8px #1E7B1E,8px -16px #2E8B2E,-8px -16px #228B22,-16px -12px #1E7B1E,-20px -4px #2E8B2E,-16px 8px #228B22,-12px 12px #1E7B1E,-4px 16px #2E8B2E,4px 16px #228B22,12px 12px #1E7B1E,16px 8px #2E8B2E,20px 0 #228B22,16px -4px #1E7B1E,-12px -8px #2E8B2E,
    /* Ring 3 tips */ 20px -20px #1E7B1E,24px -12px #2E8B2E,16px -20px #228B22,8px -20px #2E8B2E,-8px -20px #228B22,-16px -16px #1E7B1E,-24px -8px #2E8B2E,-20px 4px #228B22,-20px 12px #1E7B1E,-16px 16px #2E8B2E,-8px 20px #228B22,4px 20px #1E7B1E,12px 16px #2E8B2E,20px 12px #228B22,24px 4px #1E7B1E,24px -4px #2E8B2E;
  animation:palm-sway 6s ease-in-out infinite alternate}
@keyframes palm-sway{0%{transform:rotate(-3deg)}100%{transform:rotate(3deg)}}

/* Pixel beach towel (on sand, overhead view — striped) */
.px-towel{position:absolute;bottom:48%;right:25%;
  box-shadow:
    /* Row 0-9: 24×10 pixel towel with stripes */ 0 0 #E84040,4px 0 #E84040,8px 0 #E84040,12px 0 #E84040,16px 0 #E84040,20px 0 #E84040,24px 0 #E84040,28px 0 #E84040,32px 0 #E84040,36px 0 #E84040,40px 0 #E84040,44px 0 #E84040,48px 0 #E84040,52px 0 #E84040,56px 0 #E84040,60px 0 #E84040,64px 0 #E84040,68px 0 #E84040,72px 0 #E84040,76px 0 #E84040,80px 0 #E84040,84px 0 #E84040,88px 0 #E84040,92px 0 #E84040,96px 0 #E84040,
    0 4px #FFD700,4px 4px #FFD700,8px 4px #FFD700,12px 4px #FFD700,16px 4px #FFD700,20px 4px #FFD700,24px 4px #FFD700,28px 4px #FFD700,32px 4px #FFD700,36px 4px #FFD700,40px 4px #FFD700,44px 4px #FFD700,48px 4px #FFD700,52px 4px #FFD700,56px 4px #FFD700,60px 4px #FFD700,64px 4px #FFD700,68px 4px #FFD700,72px 4px #FFD700,76px 4px #FFD700,80px 4px #FFD700,84px 4px #FFD700,88px 4px #FFD700,92px 4px #FFD700,96px 4px #FFD700,
    0 8px #E84040,4px 8px #E84040,8px 8px #E84040,12px 8px #E84040,16px 8px #E84040,20px 8px #E84040,24px 8px #E84040,28px 8px #E84040,32px 8px #E84040,36px 8px #E84040,40px 8px #E84040,44px 8px #E84040,48px 8px #E84040,52px 8px #E84040,56px 8px #E84040,60px 8px #E84040,64px 8px #E84040,68px 8px #E84040,72px 8px #E84040,76px 8px #E84040,80px 8px #E84040,84px 8px #E84040,88px 8px #E84040,92px 8px #E84040,96px 8px #E84040,
    0 12px #FFD700,4px 12px #FFD700,8px 12px #FFD700,12px 12px #FFD700,16px 12px #FFD700,20px 12px #FFD700,24px 12px #FFD700,28px 12px #FFD700,32px 12px #FFD700,36px 12px #FFD700,40px 12px #FFD700,44px 12px #FFD700,48px 12px #FFD700,52px 12px #FFD700,56px 12px #FFD700,60px 12px #FFD700,64px 12px #FFD700,68px 12px #FFD700,72px 12px #FFD700,76px 12px #FFD700,80px 12px #FFD700,84px 12px #FFD700,88px 12px #FFD700,92px 12px #FFD700,96px 12px #FFD700,
    0 16px #E84040,4px 16px #E84040,8px 16px #E84040,12px 16px #E84040,16px 16px #E84040,20px 16px #E84040,24px 16px #E84040,28px 16px #E84040,32px 16px #E84040,36px 16px #E84040,40px 16px #E84040,44px 16px #E84040,48px 16px #E84040,52px 16px #E84040,56px 16px #E84040,60px 16px #E84040,64px 16px #E84040,68px 16px #E84040,72px 16px #E84040,76px 16px #E84040,80px 16px #E84040,84px 16px #E84040,88px 16px #E84040,92px 16px #E84040,96px 16px #E84040,
    0 20px #FFD700,4px 20px #FFD700,8px 20px #FFD700,12px 20px #FFD700,16px 20px #FFD700,20px 20px #FFD700,24px 20px #FFD700,28px 20px #FFD700,32px 20px #FFD700,36px 20px #FFD700,40px 20px #FFD700,44px 20px #FFD700,48px 20px #FFD700,52px 20px #FFD700,56px 20px #FFD700,60px 20px #FFD700,64px 20px #FFD700,68px 20px #FFD700,72px 20px #FFD700,76px 20px #FFD700,80px 20px #FFD700,84px 20px #FFD700,88px 20px #FFD700,92px 20px #FFD700,96px 20px #FFD700,
    0 24px #E84040,4px 24px #E84040,8px 24px #E84040,12px 24px #E84040,16px 24px #E84040,20px 24px #E84040,24px 24px #E84040,28px 24px #E84040,32px 24px #E84040,36px 24px #E84040,40px 24px #E84040,44px 24px #E84040,48px 24px #E84040,52px 24px #E84040,56px 24px #E84040,60px 24px #E84040,64px 24px #E84040,68px 24px #E84040,72px 24px #E84040,76px 24px #E84040,80px 24px #E84040,84px 24px #E84040,88px 24px #E84040,92px 24px #E84040,96px 24px #E84040,
    0 28px #FFD700,4px 28px #FFD700,8px 28px #FFD700,12px 28px #FFD700,16px 28px #FFD700,20px 28px #FFD700,24px 28px #FFD700,28px 28px #FFD700,32px 28px #FFD700,36px 28px #FFD700,40px 28px #FFD700,44px 28px #FFD700,48px 28px #FFD700,52px 28px #FFD700,56px 28px #FFD700,60px 28px #FFD700,64px 28px #FFD700,68px 28px #FFD700,72px 28px #FFD700,76px 28px #FFD700,80px 28px #FFD700,84px 28px #FFD700,88px 28px #FFD700,92px 28px #FFD700,96px 28px #FFD700,
    0 32px #E84040,4px 32px #E84040,8px 32px #E84040,12px 32px #E84040,16px 32px #E84040,20px 32px #E84040,24px 32px #E84040,28px 32px #E84040,32px 32px #E84040,36px 32px #E84040,40px 32px #E84040,44px 32px #E84040,48px 32px #E84040,52px 32px #E84040,56px 32px #E84040,60px 32px #E84040,64px 32px #E84040,68px 32px #E84040,72px 32px #E84040,76px 32px #E84040,80px 32px #E84040,84px 32px #E84040,88px 32px #E84040,92px 32px #E84040,96px 32px #E84040,
    0 36px #FFD700,4px 36px #FFD700,8px 36px #FFD700,12px 36px #FFD700,16px 36px #FFD700,20px 36px #FFD700,24px 36px #FFD700,28px 36px #FFD700,32px 36px #FFD700,36px 36px #FFD700,40px 36px #FFD700,44px 36px #FFD700,48px 36px #FFD700,52px 36px #FFD700,56px 36px #FFD700,60px 36px #FFD700,64px 36px #FFD700,68px 36px #FFD700,72px 36px #FFD700,76px 36px #FFD700,80px 36px #FFD700,84px 36px #FFD700,88px 36px #FFD700,92px 36px #FFD700,96px 36px #FFD700;
  transform:rotate(-5deg);
  opacity:0.85}

/* Pixel footprints (tiny dots near shore) */
.px-prints{position:absolute;top:4%;left:20%;width:0;height:0;
  box-shadow:
    0 0 rgba(180,160,130,0.5),12px 0 rgba(180,160,130,0.5),
    -4px 8px rgba(180,160,130,0.4),16px 8px rgba(180,160,130,0.5),
    -8px 16px rgba(180,160,130,0.4),20px 16px rgba(180,160,130,0.4),
    -12px 24px rgba(180,160,130,0.35),24px 24px rgba(180,160,130,0.4),
    -8px 32px rgba(180,160,130,0.3),20px 32px rgba(180,160,130,0.35),
    -4px 40px rgba(180,160,130,0.25),16px 40px rgba(180,160,130,0.3);
  image-rendering:pixelated}

/* Pixel pebbles (tiny scattered dots) */
.px-pebbles{position:absolute;top:15%;left:0;right:0;height:50%;width:0;height:0;
  box-shadow:

// Build index
const wById={},wByWord={};
WORDS.forEach(w=>{wById[w.id]=w;wByWord[w.word.toLowerCase()]=w});

function getSessionWords(n=40){
  const pool=WORDS.map(w=>{
    const p=S.progress[w.id];let wt=3;
    if(p){if(p.status==='unknown'||p.status==='reviewed_unknown')wt=8;else if(p.status==='reviewed_known')wt=1;else wt=2}
    return{w,wt};
  });
  const sel=[],used=new Set();
  while(sel.length<Math.min(n,pool.length)){
    const total=pool.reduce((s,i)=>used.has(i.w.id)?s:s+i.wt,0);
    if(total<=0)break;
    let r=Math.random()*total;
    for(let i=0;i<pool.length;i++){if(used.has(pool[i].w.id))continue;r-=pool[i].wt;if(r<=0){sel.push(pool[i].w);used.add(pool[i].w.id);break}}
  }
  for(let i=sel.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[sel[i],sel[j]]=[sel[j],sel[i]]}
  return sel;
}

function highlight(s,w){
  const r=new RegExp(`\\b(${w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})\\b`,'i');
  return s.replace(r,'<span class="hl">$1</span>');
}

// === SCREENS ===
function show(id){
  document.querySelectorAll('.screen').forEach(s=>{
    s.classList.remove('on');s.classList.add('off');
  });
  const el=document.getElementById(id);
  if(el){el.classList.remove('off');el.classList.add('on')}
  S.screen=id;
  if(id==='favs') renderFavs();
  if(id==='wordbank') renderWB();
  if(id==='settings') renderSet();
  if(id==='menu') updateMenuStats();
}

// === AUTH ===
function initPad(){
  const pd=document.getElementById('pd'),pi=document.getElementById('auth-pin')||{value:''};
  let pin='';
  document.getElementById('pad').innerHTML='';
  for(let i=1;i<=9;i++){
    const b=document.createElement('button');b.textContent=i;
    b.onclick=()=>{if(pin.length<4){pin+=i;pd.textContent=(pin+'___').slice(0,4).split('').join(' ')}}
    document.getElementById('pad').appendChild(b);
  }
  const bk=document.createElement('button');bk.textContent='⌫';
  bk.onclick=()=>{pin=pin.slice(0,-1);pd.textContent=(pin+'___').slice(0,4).split('').join(' ')}
  document.getElementById('pad').appendChild(bk);
  const z=document.createElement('button');z.textContent='0';
  z.onclick=()=>{if(pin.length<4){pin+='0';pd.textContent=(pin+'___').slice(0,4).split('').join(' ')}}
  document.getElementById('pad').appendChild(z);
  const go=document.createElement('button');go.textContent='✓';go.className='go';
  go.onclick=()=>doAuth();
  document.getElementById('pad').appendChild(go);
  // Store pin for retrieval
  document.getElementById('pad')._getPin=()=>pin;
}

function doAuth(){
  const u=document.getElementById('au').value.trim();
  const p=document.getElementById('pad')._getPin();
  const st=document.getElementById('auth-status');
  if(!u||u.length<3){st.textContent='Username must be 3+ characters';return}
  if(!p||p.length<4){st.textContent='Enter a 4-digit PIN';return}
  st.textContent='';
  S.user={id:'u'+Date.now(),username:u,token:'t'+Date.now()};
  save('user',S.user);
  show('menu');
  document.getElementById('suser').textContent=u;
}

// === MENU ===
function updateMenuStats(){
  let k=0,u=0;
  Object.values(S.progress).forEach(p=>{
    if(p.status==='known'||p.status==='reviewed_known')k++;
    if(p.status==='unknown'||p.status==='reviewed_unknown')u++;
  });
  document.getElementById('sk').textContent=k;
  document.getElementById('su').textContent=u;
}

// === GAME ===
let timerInt=null,toastTimer=null,paused=false;

function togglePause(){
  paused=!paused;
  const ov=document.getElementById('pause-ov');
  if(paused){
    clearInterval(timerInt);timerInt=null;
    ov.style.display='flex';
    document.getElementById('bgpause').textContent='▶';
  }else{
    ov.style.display='none';
    document.getElementById('bgpause').textContent='⏸';
    // Resume timer
    timerInt=setInterval(()=>{
      const g=S.game;g.timer--;
      document.getElementById('rtxt').textContent=g.timer;
      updateRing(g.timer,S.settings.timer);
      if(g.timer<=0){clearInterval(timerInt);autoUnknown();}
    },1000);
  }
}

function startGame(){
  S.game={words:getSessionWords(40),idx:0,known:0,unknown:0,history:[],status:'playing'};
  S.game.timer=S.settings.timer;
  show('game');
  showSentence();
}

function showSentence(){
  const g=S.game;
  if(g.idx>=g.words.length){endGame();return}
  const w=g.words[g.idx];
  document.getElementById('sent').innerHTML=highlight(w.sent,w.word);
  document.getElementById('badge').textContent=w.word+' · '+w.pos+' · '+w.level;
  document.getElementById('toast').className='toasty';
  document.getElementById('hints').style.opacity=S.game.idx<3?'0.6':'0';
  g.timer=S.settings.timer;
  g.running=true;
  document.getElementById('rtxt').textContent=g.timer;
  updateRing(g.timer,S.settings.timer);
  clearInterval(timerInt);
  timerInt=setInterval(()=>{
    g.timer--;
    document.getElementById('rtxt').textContent=g.timer;
    updateRing(g.timer,S.settings.timer);
    if(g.timer<=0){clearInterval(timerInt);autoUnknown();}
  },1000);
  // Animate card in
  const card=document.getElementById('card');
  card.classList.remove('fly-in');void card.offsetWidth;card.classList.add('fly-in');
}

function updateRing(rem,total){
  const r=document.getElementById('ring');
  const circ=2*Math.PI*26;
  r.style.strokeDashoffset=circ*(1-rem/total);
  r.style.stroke=rem/total<=0.1?'#E74C3C':rem/total<=0.25?'#F39C12':rem/total<=0.5?'#FFD700':'#27AE60';
}

function autoUnknown(){processSwipe('down',true)}
function processSwipe(dir,auto=false){
  if(paused)return;
  const g=S.game;
  if(g.status!=='playing')return;
  const w=g.words[g.idx];
  if(!w)return;
  const card=document.getElementById('card');

  if(dir==='up'){
    g.history.push({type:'known',word:w,idx:g.idx,prev:S.progress[w.id]});
    g.known++;S.progress[w.id]={status:'known',ts:new Date().toISOString()};
    save('prog',S.progress);
    toast('✓ Got it!','#27AE60');
    card.classList.remove('fly-in');void card.offsetWidth;card.classList.add('fly-up');
    g.idx++;updateScores();setTimeout(showSentence,350);
  }else if(dir==='down'){
    g.history.push({type:'unknown',word:w,idx:g.idx,prev:S.progress[w.id]});
    g.unknown++;S.progress[w.id]={status:'unknown',ts:new Date().toISOString()};
    save('prog',S.progress);
    toast(auto?'Time\'s up! Review needed':'Added to review','#F39C12');
    card.classList.remove('fly-in');void card.offsetWidth;card.classList.add('fly-down');
    g.idx++;updateScores();
    if(g.unknown>=S.settings.limit){clearInterval(timerInt);setTimeout(startReview,600)}
    else setTimeout(showSentence,350);
  }else if(dir==='left'){
    if(g.history.length===0){toast('Nothing to undo','#8B9DAF');return}
    const a=g.history.pop();
    if(a.type==='known')g.known=Math.max(0,g.known-1);
    else g.unknown=Math.max(0,g.unknown-1);
    S.progress[a.word.id]=a.prev||undefined;
    if(!a.prev)delete S.progress[a.word.id];
    save('prog',S.progress);
    g.idx=a.idx;
    card.classList.remove('fly-in');void card.offsetWidth;card.classList.add('fly-left');
    toast('↶ Undone!','#3498DB');
    updateScores();
    setTimeout(showSentence,350);
  }
}

function updateScores(){
  document.getElementById('gk').textContent=S.game.known;
  document.getElementById('gu').textContent=S.game.unknown;
  document.getElementById('gulim').textContent=S.settings.limit;
  const pct=Math.min(100,(S.game.unknown/S.settings.limit)*100);
  document.getElementById('gfill').style.width=pct+'%';
}

function doFavorite(){
  if(S.screen!=='game')return;
  const w=S.game.words[S.game.idx];
  if(!w)return;
  const exists=S.favs.find(f=>f.word===w.word&&f.sent===w.sent);
  if(exists){toast('Already saved ♥','#E91E63');return}
  S.favs.push({id:'f'+Date.now(),word:w.word,sent:w.sent,def:w.def,pos:w.pos,phon:w.phonetic||'',saved:new Date().toISOString()});
  save('favs',S.favs);
  // Hearts
  const hc=document.getElementById('hearts');
  for(let i=0;i<5;i++){
    const h=document.createElement('span');h.className='fh';h.textContent='♥';
    h.style.left=(30+Math.random()*40)+'%';h.style.animationDelay=(i*0.1)+'s';
    h.style.fontSize=(16+Math.random()*20)+'px';hc.appendChild(h);
    setTimeout(()=>h.remove(),1200);
  }
  toast('♥ Saved!','#E91E63');
}

function toast(msg,color='var(--text)'){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.color=color;
  t.className='toasty show';
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{t.className='toasty'},1500);
}

function endGame(){
  clearInterval(timerInt);
  S.game.status='idle';
  toast('Session complete!','var(--success)');
  setTimeout(()=>{show('menu');updateMenuStats()},600);
}

// === REVIEW ===
function startReview(){
  const g=S.game;
  const seen=new Set(),cards=[];
  g.history.forEach(a=>{
    if(a.type==='unknown'&&!seen.has(a.word.id)){
      seen.add(a.word.id);
      cards.push({word:a.word.word,sent:a.word.sent,def:a.word.def,pos:a.word.pos,phon:a.word.phonetic||'',flipped:false,reviewed:false});
    }
  });
  S.review={cards,idx:0,flipped:false};
  show('review');
  renderReviewCard();
}

function renderReviewCard(){
  const r=S.review,c=r.cards[r.idx];
  if(!c)return;
  document.getElementById('fsent').innerHTML=highlight(c.sent,c.word);
  document.getElementById('fword').textContent=c.word;
  document.getElementById('fphon').textContent=c.phon;
  document.getElementById('fpos2').textContent=c.pos;
  document.getElementById('fdef').textContent=c.def;
  document.getElementById('flipinner').classList.remove('f');
  document.getElementById('rprog').textContent=(r.idx+1)+'/'+r.cards.length;
  renderDots();
}

function toggleFlip(){
  const inner=document.getElementById('flipinner');
  inner.classList.toggle('f');
  S.review.flipped=inner.classList.contains('f');
  if(S.review.flipped){S.review.cards[S.review.idx].reviewed=true}
}

function renderDots(){
  const dc=document.getElementById('rdots');dc.innerHTML='';
  S.review.cards.forEach((c,i)=>{
    const d=document.createElement('span');d.className='dot';
    if(i===S.review.idx)d.classList.add('a');
    if(c.reviewed)d.classList.add('ok');
    d.onclick=()=>{S.review.idx=i;S.review.flipped=false;renderReviewCard()}
    dc.appendChild(d);
  });
}

function prevCard(){
  if(S.review.idx>0){S.review.idx--;S.review.flipped=false;renderReviewCard()}
}
function nextCard(){
  if(S.review.idx<S.review.cards.length-1){S.review.idx++;S.review.flipped=false;renderReviewCard()}
}
function doneReview(){
  S.review.cards.forEach(c=>{if(c.reviewed)S.progress[c.word]={status:'reviewed_known',ts:new Date().toISOString()}});
  save('prog',S.progress);
  S.game.unknown=0;S.game.status='playing';S.review={cards:[],idx:0,flipped:false};
  show('game');updateScores();showSentence();
}

// === FAVORITES ===
function renderFavs(){
  const list=document.getElementById('flist');
  const empty=document.getElementById('fempty');
  if(S.favs.length===0){
    list.innerHTML='';empty.style.display='block';return;
  }
  empty.style.display='none';
  list.innerHTML=S.favs.map((f,i)=>`
    <div class="fitem">
      <div class="fcont">
        <p class="fsent">"${highlight(f.sent,f.word)}"</p>
        <span class="fword">${f.word}</span><span class="fpos">${f.pos}</span>
        <p class="fdef">${f.def}</p>
        <span class="fdate">${new Date(f.saved).toLocaleDateString()}</span>
      </div>
      <button class="fdel" data-i="${i}">✕</button>
    </div>`).join('');
  list.querySelectorAll('.fdel').forEach(b=>{b.onclick=function(e){e.stopPropagation();S.favs.splice(parseInt(this.dataset.i),1);save('favs',S.favs);renderFavs()}});
}

async function exportPDF(){
  if(S.favs.length===0){alert('No favorites to export!');return}
  // Load jsPDF dynamically
  if(!window.jspdf){
    await new Promise((resolve,reject)=>{
      const s=document.createElement('script');
      s.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
      s.onload=resolve;s.onerror=reject;document.head.appendChild(s);
    });
  }
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF({unit:'mm',format:'a4'});
  const pw=doc.internal.pageSize.getWidth(),ph=doc.internal.pageSize.getHeight();
  const m=20,cw=pw-m*2;

  // Cover
  doc.setFillColor('#4A90D9');doc.rect(0,0,pw,ph*0.25,'F');
  doc.setFillColor('#87CEEB');doc.rect(0,ph*0.25,pw,ph*0.15,'F');
  doc.setFillColor('#F4D9A0');doc.rect(0,ph*0.4,pw,ph*0.6,'F');
  doc.setFont('helvetica','bold');doc.setFontSize(22);doc.setTextColor('#2C3E50');
  doc.text('My IELTS Beach',pw/2,ph/2-20,{align:'center'});
  doc.setFontSize(12);doc.setTextColor('#5A6A7E');
  doc.text('Favorite Sentences',pw/2,ph/2-5,{align:'center'});
  doc.setFontSize(9);
  doc.text(`Exported: ${new Date().toLocaleDateString()}  |  ${S.favs.length} sentences`,pw/2,ph/2+10,{align:'center'});
  doc.setFontSize(7);doc.setTextColor('#8B9DAF');
  doc.setGState(new doc.GState({opacity:.2}));
  doc.text('~ IELTS Beach ~',pw/2,ph-10,{align:'center'});
  doc.setGState(new doc.GState({opacity:1}));

  // Cards
  S.favs.forEach((f,i)=>{
    doc.addPage();
    let y=m+10;
    doc.setFillColor('#FFFFFF');doc.setDrawColor('#FF6B35');doc.setLineWidth(.5);
    doc.roundedRect(m,y,cw,110,3,3,'FD');
    y+=10;
    doc.setFontSize(10);doc.setTextColor('#FF6B35');doc.text(`#${i+1}`,m+5,y);
    y+=10;
    doc.setFontSize(11);doc.setTextColor('#2C3E50');
    const sl=doc.splitTextToSize(`"${f.sent}"`,cw-20);
    doc.text(sl,m+10,y);y+=sl.length*6+6;
    doc.setDrawColor('#8B9DAF');doc.line(m+10,y,pw-m-10,y);y+=6;
    doc.setFont('helvetica','bold');doc.setFontSize(14);doc.setTextColor('#FF6B35');
    doc.text(f.word,m+10,y);y+=7;
    doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor('#8B9DAF');
    if(f.phon)doc.text(f.phon,m+10,y);y+=5;
    doc.setFontSize(10);doc.text(f.pos,m+10,y);y+=6;
    doc.setFontSize(10);doc.setTextColor('#2C3E50');
    const dl=doc.splitTextToSize(f.def,cw-20);doc.text(dl,m+10,y);
    doc.setFontSize(6);doc.setTextColor('#8B9DAF');
    doc.setGState(new doc.GState({opacity:.2}));
    doc.text('~ IELTS Beach ~',pw/2,ph-8,{align:'center'});
    doc.setGState(new doc.GState({opacity:1}));
  });
  doc.save(`ielts-beach-favorites-${new Date().toISOString().split('T')[0]}.pdf`);
}

function renderWB(){

}

function doWBFilter(){
  const levels=[...document.querySelectorAll('#wbfilters .chip.on')].map(c=>c.dataset.l);
  const q=(document.getElementById('wbs').value||'').toLowerCase();
  let ws=WORDS.filter(w=>levels.includes(w.level));
  if(q)ws=ws.filter(w=>w.word.toLowerCase().includes(q)||w.def.toLowerCase().includes(q));
  const list=document.getElementById('wblist');
  list.innerHTML=ws.slice(0,80).map(w=>`<div class="wbitem"><div class="wbm"><span class="wbw">${w.word}</span><span class="chip on">${w.level}</span></div><p class="wbdef">${w.def}</p></div>`).join('')||'<p style="text-align:center;color:var(--muted);padding:24px">No words found</p>';
}

// === SWIPE ===
function initSwipe(el){
  let sx=0,sy=0,st=0,dx=0,dy=0,touching=false;
  let lastTap=0,lx=0,ly=0;
  const TH=40;

  el.addEventListener('touchstart',e=>{
    if(e.touches.length>1)return;
    sx=e.touches[0].clientX;sy=e.touches[0].clientY;st=Date.now();touching=true;
  },{passive:false});
  el.addEventListener('touchmove',e=>{if(touching)e.preventDefault()},{passive:false});
  el.addEventListener('touchend',e=>{
    if(!touching)return;touching=false;
    dx=e.changedTouches[0].clientX-sx;dy=e.changedTouches[0].clientY-sy;
    const dt=Date.now()-st,adx=Math.abs(dx),ady=Math.abs(dy);
    // Double tap
    if(adx<15&&ady<15&&dt<400){
      const n=Date.now();
      if(n-lastTap<400&&Math.abs(e.changedTouches[0].clientX-lx)+Math.abs(e.changedTouches[0].clientY-ly)<25){
        doFavorite();lastTap=0;return;
      }
      lastTap=n;lx=e.changedTouches[0].clientX;ly=e.changedTouches[0].clientY;
      if(S.screen==='review')toggleFlip();
      return;
    }
    if(adx<TH&&ady<TH)return;
    const dir=ady>adx?(dy<-TH?'up':dy>TH?'down':null):(dx<-TH?'left':dx>TH?'right':null);
    if(!dir)return;
    if(S.screen==='game')processSwipe(dir);
    else if(S.screen==='review'){if(dir==='left')nextCard();else if(dir==='right')prevCard();else if(dir==='down')doneReview();}
  },{passive:false});

  // Mouse drag
  let md=false,mx=0,my=0;
  el.addEventListener('mousedown',e=>{md=true;mx=e.clientX;my=e.clientY});
  window.addEventListener('mouseup',e=>{
    if(!md)return;md=false;
    dx=e.clientX-mx;dy=e.clientY-my;
    const adx=Math.abs(dx),ady=Math.abs(dy);
    if(adx<TH&&ady<TH){
      const n=Date.now();
      if(n-lastTap<400&&Math.abs(e.clientX-lx)+Math.abs(e.clientY-ly)<20){doFavorite();lastTap=0;return}
      lastTap=n;lx=e.clientX;ly=e.clientY;
      if(S.screen==='review')toggleFlip();
      return;
    }
    const dir=ady>adx?(dy<-TH?'up':dy>TH?'down':null):(dx<-TH?'left':dx>TH?'right':null);
    if(!dir)return;
    if(S.screen==='game')processSwipe(dir);
    else if(S.screen==='review'){if(dir==='left')nextCard();else if(dir==='right')prevCard();else if(dir==='down')doneReview();}
  });

  // Keyboard
  window.addEventListener('keydown',e=>{
    if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
    if(S.screen==='game'){
      if(e.key===' '||e.key==='Escape'){e.preventDefault();togglePause();}
      else if(e.key==='ArrowUp'||e.key==='w'||e.key==='W')processSwipe('up');
      else if(e.key==='ArrowDown'||e.key==='s'||e.key==='S')processSwipe('down');
      else if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A')processSwipe('left');
      else if(e.key==='f'||e.key==='F'){e.preventDefault();doFavorite();}
    }else if(S.screen==='review'){
      if(e.key==='ArrowLeft')prevCard();
      else if(e.key==='ArrowRight')nextCard();
      else if(e.key==='Enter'||e.key===' ')toggleFlip();
    }
  });
}

  else{period='night';r.setProperty('--sky-top','#0D1B2A');r.setProperty('--sky-mid','#1B2838');r.setProperty('--sky-bottom','#2C3E50');r.setProperty('--sky-horizon','#3D5A80');r.setProperty('--sun-color','#E8E8E8');r.setProperty('--sun-glow','rgba(192,192,192,0.3)');r.setProperty('--sun-size','0px');r.setProperty('--sun-top','0%');r.setProperty('--ocean-top','#1B3A5C');r.setProperty('--ocean-bottom','#0F2440');r.setProperty('--sand','#B8A088');r.setProperty('--sand-dark','#A09078');r.setProperty('--star-opacity','0.9');r.setProperty('--moon-opacity','1');r.setProperty('--cloud-opacity','0.06');}
  console.log('Beach scene:',period);
}

  setInterval(setSceneByTime,600000);

  // Auth
  initPad();
  document.getElementById('bsub').onclick=doAuth;
  if(S.user){document.getElementById('au').value=S.user.username||'';show('menu');updateMenuStats()}

  // Menu
  document.getElementById('bstart').onclick=startGame;
  document.getElementById('bfav').onclick=()=>show('favs');
  document.getElementById('bwb').onclick=()=>show('wordbank');
  document.getElementById('bset').onclick=()=>show('settings');
  document.getElementById('bgback').onclick=()=>{clearInterval(timerInt);paused=false;show('menu');updateMenuStats()};
  document.getElementById('bgpause').onclick=togglePause;

    }

  document.getElementById('rbback').onclick=doneReview;

  // WB
  document.getElementById('wbbback').onclick=()=>show('menu');
  document.getElementById('wbs').oninput=doWBFilter;

  // Settings
  document.getElementById('sbback').onclick=()=>{show('menu');updateMenuStats()}

  document.getElementById('slim').oninput=function(){S.settings.limit=parseInt(this.value);document.getElementById('slv').textContent=this.value;save('set',S.settings)}
  document.getElementById('stheme').onclick=function(){

}
